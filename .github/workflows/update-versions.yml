name: Update Scala versions

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 8
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - run: sbt updateVersions

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update Scala versions in versions.yaml"
          branch: chore/update-scala-versions
          title: "chore: update Scala versions in versions.yaml"
          body: |
            Automated update from `sbt updateVersions`.

            Generated by `.github/workflows/update-versions.yml`.
          add-paths: versions.yaml
